spring:
  application:
    name: SpringBoot_test2

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # [DB명] 은 교체
    url: jdbc:mysql://localhost:3306/SpringBoot_test2?useUnicode=true&characterEncoding=utf8&autoReconnect=true&serverTimezone=Asia/Seoul&useSSL=false
    username: root
    password: 1234

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        show_sql: true

# LOGGING
logging:
  level:
    org.hibernate.orm.jdbc.bind: TRACE
    org.hibernate.orm.jdbc.extract: TRACE
