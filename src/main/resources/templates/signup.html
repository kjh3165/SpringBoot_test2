<html layout:decorate="~{layout}">
<div layout:fragment="content" class="container">
    <h5 class="my-3 border-bottom pb-2">회원 가입</h5>
    <form th:action="@{/usr/signup}" th:object="${userCreateForm}" method="post">
        <div th:replace="~{form_errors :: formErrorsFragment}"></div>
        <div class="mb-3">
            <label for="username" class="form-label">ID</label>
            <input type="text" th:field="*{username}" id="username" class="form-control">
        </div>
        <div class="mb-3">
            <label for="nickname" class="form-label">닉네임</label>
            <input type="text" th:field="*{nickname}" id="nickname" class="form-control">
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">비밀번호</label>
            <input type="password" th:field="*{password}" id="password" class="form-control">
        </div>
        <div class="mb-3">
            <label for="password_chk" class="form-label">비밀번호 확인</label>
            <input type="password" th:field="*{password_chk}" id="password_chk" class="form-control">
        </div>

        <input type="submit" value="회원 가입" class="btn btn-primary my-2">
    </form>
</div>
</html>
