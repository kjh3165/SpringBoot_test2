<link rel="stylesheet" type="text/css"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
>
<div class="container my-3">
    <h2 class="border-bottom py-2" th:text="${article.title}"></h2>
    <div class="card my-3">
        <div class="card-body">
            <div class="card-text" style="white-space: pre-line;" th:text="${article.content}"></div>
            <div class="d-flex justify-content-end">
                <div class="badge bg-light text-dark p-2 text-start">
                    <div th:text="${#temporals.format(article.modifiedDate, 'yyyy-MM-dd HH:mm')}"></div>
                </div>
            </div>

            <a th:href="@{|/article/modify/${article.id}|}" class="btn btn-secondary">수정</a>
            <a th:href="@{|/article/delete/${article.id}|}" class="btn btn-danger">삭제</a>
        </div>
    </div>
    <a th:href="@{/article/list}">Article 목록</a>
</div>
